services:
  app:
    build: .
    env_file: .env
    volumes:
      - ./app/uploads:/project/app/uploads
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8000:443"
    volumes:
      - type: bind
        source: ./nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - ./certs:/etc/nginx/certs
    depends_on:
      - app
    restart: unless-stopped
